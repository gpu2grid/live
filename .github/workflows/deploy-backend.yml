name: Deploy backend to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push backend to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git clone https://user:${HF_TOKEN}@huggingface.co/spaces/gpu2grid/live hf-space
          rsync -av --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='openg2g.egg-info' \
            --exclude='outputs/' \
            backend/ hf-space/
          cd hf-space
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to push."
          else
            git commit -m "deploy: sync from GitHub $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi